<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Assistant</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>
  <h1>Robot Assistant</h1>

  <div class="robot-container">
    <div class="robot" id="robot">
      <div class="head">
        <span class="eye"></span>
        <span class="eye"></span>
      </div>
      <div class="body"></div>
      <div class="arm left" id="leftArm"></div>
      <div class="arm right wave" id="rightArm"></div>
    </div>
  </div>

  <div id="chat-box">
    <div class="msg bot">
      <div class="md">Hi! 👋 Try: <b>“make a markdown table”</b></div>
    </div>
  </div>

  <div class="input-row">
    <input id="user-input" type="text" placeholder="Type your message..." autocomplete="off" />
    <button id="send-btn">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
